services:
  # Node.js Backend
  backend:
    build:
      context: ./sentinel-stream/server
      dockerfile: Dockerfile
    container_name: sentinel-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      MONGO_URI: ${MONGO_URI}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-very-strong-random-secret-here-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-another-strong-random-secret-min-32-chars}
    volumes:
      # Optional: mount logs if you want persistence
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - sentinel-network
    expose:
      - "5000"

  # React Frontend
  frontend:
    build:
      context: ./sentinel-stream/client
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      # Backend API URL for Nginx proxy
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000/api}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - sentinel-network
    expose:
      - "80"

volumes:
  backend_logs:
    driver: local

networks:
  sentinel-network:
    driver: bridge
